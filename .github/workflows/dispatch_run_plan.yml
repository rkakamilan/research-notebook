name: Dispatch Run Plan

# plan:approved ラベルが付いたときに cheminfomatics-research-pipeline へ
# repository_dispatch (type: run-plan) を送信する。
on:
  issues:
    types: [labeled]

jobs:
  dispatch:
    if: github.event.label.name == 'plan:approved'
    runs-on: ubuntu-latest

    steps:
      - name: Extract plan_id from issue body
        id: extract
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Issue 本文の "## plan_id" セクション直後の行を抽出
          PLAN_ID=$(echo "$ISSUE_BODY" | grep -A2 "^## plan_id" | grep -v "^##" | grep -v "^<!--" | tr -d ' \r' | head -1)

          if [ -z "$PLAN_ID" ]; then
            echo "ERROR: could not extract plan_id from issue body" >&2
            exit 1
          fi

          echo "plan_id=$PLAN_ID" >> "$GITHUB_OUTPUT"
          echo "plan_issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Dispatching: plan_id=$PLAN_ID issue=$ISSUE_NUMBER"

      - name: Apply plan:run label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --add-label "plan:run" \
            --remove-label "plan:approved" \
            --repo ${{ github.repository }}

      - name: Send repository_dispatch to cheminfomatics-research-pipeline
        env:
          PIPELINE_DISPATCH_TOKEN: ${{ secrets.PIPELINE_DISPATCH_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PIPELINE_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/rkakamilan/cheminfomatics-research-pipeline/dispatches \
            -d "{
              \"event_type\": \"run-plan\",
              \"client_payload\": {
                \"plan_issue_number\": ${{ steps.extract.outputs.plan_issue_number }},
                \"plan_id\": \"${{ steps.extract.outputs.plan_id }}\"
              }
            }"

      - name: Summary
        run: |
          echo "### Dispatched Run Plan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **plan_id**: ${{ steps.extract.outputs.plan_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **plan_issue**: #${{ steps.extract.outputs.plan_issue_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **target**: rkakamilan/cheminfomatics-research-pipeline" >> "$GITHUB_STEP_SUMMARY"
